<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Repo Visualiser</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header id="toolbar">
      <span id="brand">repo-visualiser</span>
      <button id="open-repo" data-i18n="btn.open">📂 Open…</button>
      <span id="repo-name" class="muted" title=""></span>
      <div id="mode-toggle">
        <button id="mode-graph" class="active" data-i18n="mode.graph">Graph</button>
        <button id="mode-folder" data-i18n="mode.folder">Folder</button>
      </div>
      <input id="search" type="search" data-i18n-placeholder="search.placeholder" />
      <span id="stats" class="muted"></span>
      <span class="spacer"></span>
      <span class="legend">
        <span class="legend-item"><i class="edge-constructor"></i><span data-i18n="legend.constructor">constructor</span></span>
        <span class="legend-item"><i class="edge-field"></i><span data-i18n="legend.field">field</span></span>
      </span>
      <button id="relayout" data-i18n="btn.relayout">Re-layout</button>
      <button id="reanalyze" data-i18n="btn.reanalyze">Re-analyze</button>
      <button id="tasks-btn"><span data-i18n="btn.tasks">Tasks</span> <span id="tasks-count">0</span></button>
      <select id="lang-select" title="Language">
        <option value="en">EN</option>
        <option value="tr">TR</option>
      </select>
    </header>

    <main id="viewport">
      <div id="world">
        <svg id="edges"></svg>
        <div id="nodes"></div>
      </div>
      <div id="empty" class="hidden" data-i18n="empty.graph">No graph yet. Open a repository.</div>
    </main>

    <section id="tree" class="hidden"></section>

    <aside id="tasks-drawer" class="hidden">
      <div class="drawer-header">
        <span data-i18n="tasks.title">Tasks</span>
        <button id="tasks-close" title="Close">×</button>
      </div>
      <div id="tasks-hint" class="muted" data-i18n="tasks.hint"></div>
      <div id="tasks-list"></div>
    </aside>

    <div id="toast" class="hidden"></div>

    <div id="behavior-modal" class="hidden">
      <div class="modal-card">
        <div class="modal-title"><span data-i18n="addbeh.title">Add behavior</span> — <span id="behavior-target"></span></div>
        <input id="behavior-name" type="text" data-i18n-placeholder="addbeh.name" />
        <textarea id="behavior-desc" rows="3" data-i18n-placeholder="addbeh.desc"></textarea>
        <input id="behavior-sig" type="text" data-i18n-placeholder="addbeh.sig" />
        <label class="modal-sub" data-i18n="addbeh.errLabel">On not-found / failure</label>
        <select id="behavior-error-mode">
          <option value="throw" data-i18n="addbeh.errThrow">Throw exception (recommended)</option>
          <option value="nullable" data-i18n="addbeh.errNullable">Return null / undefined</option>
          <option value="default" data-i18n="addbeh.errDefault">Default (repo convention)</option>
        </select>
        <input id="behavior-exception" type="text" data-i18n-placeholder="addbeh.exception" />
        <div id="behavior-error" class="modal-error hidden"></div>
        <div class="modal-actions">
          <button id="behavior-cancel" data-i18n="modal.cancel">Cancel</button>
          <button id="behavior-confirm" class="primary" data-i18n="addbeh.create">Create task</button>
        </div>
      </div>
    </div>

    <div id="open-modal" class="hidden">
      <div class="modal-card">
        <div class="modal-title" data-i18n="open.title">Open repository</div>
        <input id="open-path" type="text" data-i18n-placeholder="open.path" />
        <div id="open-error" class="modal-error hidden"></div>
        <div id="recent-label" class="modal-sub hidden" data-i18n="open.recent">Recent</div>
        <div id="recent-list"></div>
        <div class="modal-actions">
          <button id="open-cancel" data-i18n="modal.cancel">Cancel</button>
          <button id="open-confirm" class="primary" data-i18n="open.confirm">Open</button>
        </div>
      </div>
    </div>

    <script src="i18n.js"></script>
    <script src="app.js"></script>
  </body>
</html>
