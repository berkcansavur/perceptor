name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build, package & release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run check-types

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Package .vsix
        run: npm run package

      - name: Resolve .vsix path
        id: vsix
        working-directory: packages/extension
        run: |
          VSIX=$(ls perceptor-*.vsix 2>/dev/null | head -1)
          if [ -z "$VSIX" ]; then echo "::error::No .vsix found"; exit 1; fi
          echo "file=$VSIX" >> "$GITHUB_OUTPUT"
          echo "version=${VSIX#perceptor-}" | sed 's/\.vsix$//' >> "$GITHUB_OUTPUT"

      - name: Publish to VS Code Marketplace
        working-directory: packages/extension
        run: npx --yes @vscode/vsce publish --no-dependencies --packagePath ${{ steps.vsix.outputs.file }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.vsix.outputs.version }}
          generate_release_notes: true
          files: packages/extension/${{ steps.vsix.outputs.file }}
